server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cloud_album}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:cloud-album-publisher-jwt-secret-key-must-be-at-least-256-bits-long!!}
  access-token-expire: 900       # 15分钟（秒）
  refresh-token-expire: 604800   # 7天（秒）

bootstrap:
  admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@cloud-album.local}
    nickname: ${BOOTSTRAP_ADMIN_NICKNAME:System Admin}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:cloud-album}

media:
  upload:
    part-size: 5242880              # 5MB
    session-expire-hours: 24
  task:
    max-retry: 3
    poll-interval-ms: 5000
    poll-batch-size: 10
    lock-seconds: 30

device:
  access-token-expire: 2592000
  offline-threshold-seconds: 90
  offline-check-interval-ms: 30000

release:
  manifest-path: ${RELEASE_MANIFEST_PATH:./releases/manifest.json}
  downloads-location: ${RELEASE_DOWNLOADS_LOCATION:file:./releases/}

media-source:
  crypto:
    secret: ${MEDIA_SOURCE_CRYPTO_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
