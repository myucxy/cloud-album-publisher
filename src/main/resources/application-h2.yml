spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/cloud_album;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;NON_KEYWORDS=VALUE
    username: sa
    password:
  sql:
    init:
      schema-locations: classpath:db/h2/schema.sql
      mode: always
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
